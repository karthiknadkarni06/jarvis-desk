name: Jarvis Paper Desk
on:
  schedule:
    - cron: "*/5 3-9 * * 1-5"
    - cron: "0 10 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: jarvis-desk
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jarvis-cloud-desk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run trading engine
        run: python jarvis_engine.py
      - name: Commit ledger
        run: |
          git config user.name "jarvis-bot"
          git config user.email "jarvis@users.noreply.github.com"
          git add ledger.json
          git diff --cached --quiet || git commit -m "ledger update"
          git push
